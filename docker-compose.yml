services:
  web-build:
    image: plugfox/flutter:3.41.5-web
    working_dir: /workspace
    environment:
      HOME: /home/flutter
      PUB_CACHE: /flutter/pub-cache
      XDG_CACHE_HOME: /flutter/cache
      XDG_CONFIG_HOME: /flutter/config
    volumes:
      - .:/workspace
      - flutter:/flutter
    command: >
      /bin/bash -lc "
      mkdir -p /flutter/pub-cache /flutter/cache /flutter/config &&
      if [ ! -d web ]; then
        flutter create --platforms web .;
      fi &&
      flutter pub get &&
      flutter build web --release
      "

volumes:
  flutter:
    external: true

services:
  android-build:
    image: plugfox/flutter:3.41.5-android
    working_dir: /workspace
    environment:
      HOME: /home/flutter
      PUB_CACHE: /flutter/pub-cache
      GRADLE_USER_HOME: /flutter/gradle
      XDG_CACHE_HOME: /flutter/cache
      XDG_CONFIG_HOME: /flutter/config
      ANDROID_HOME: /flutter/android-sdk
      ANDROID_SDK_ROOT: /flutter/android-sdk
      ANDROID_TOOLS_ROOT: /flutter/android-sdk
    volumes:
      - .:/workspace
      - flutter:/flutter
    command: >
      /bin/bash -lc "
      mkdir -p /flutter/pub-cache /flutter/gradle /flutter/cache /flutter/config /flutter/android-sdk &&
      if [ ! -d /flutter/android-sdk/platform-tools ]; then
        cp -a /opt/android/. /flutter/android-sdk/;
      fi &&
      flutter pub get &&
      flutter build apk --debug
      "

volumes:
  flutter:
    external: true
